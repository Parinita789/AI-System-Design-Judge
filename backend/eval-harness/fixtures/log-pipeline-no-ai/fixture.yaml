description: "Non-AI question (log pipeline). Verifies the relevance-gating rule: AI signals must be skipped, not missed."
question: "Design a log ingestion pipeline that handles 50K events/sec from microservices, retains 30 days of hot data, and supports ad-hoc queries."
rubricVersion: v2.0
mode: design

expectedScore:
  min: 2.5
  max: 4.0

expectedSignals:
  credited:
    - scope_specificity
    - dual_scale_nfrs
    - shape_and_seams
  miss: []
  hit: []
  # The headline test of this fixture: domain-restricted signals must be
  # marked cannot_evaluate (not miss) on a non-AI log-pipeline problem.
  # The seven applies_to: [agentic] signals all carry that tag now and
  # should gate cleanly via the rubric loader -> prompt path.
  skipped:
    - ai_strategy_explicit
    - inference_cost_articulated
    - latency_strategy_for_agent_calls
    - output_validation_layer
    - provider_abstraction_and_failover
    - nondeterminism_handling
    - agent_observability
    - agent_state_management
