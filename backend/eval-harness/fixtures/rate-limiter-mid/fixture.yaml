description: "Mid-quality rate limiter plan (build mode): scopes well, has a build sequence, but skips concrete validation and explicit AI strategy. Should score Average."
question: "Design a token-bucket rate limiter for a multi-tenant API."
rubricVersion: v2.0
mode: build

expectedScore:
  min: 2.5
  max: 3.5

expectedSignals:
  credited:
    - scope_specificity
    # The plan does have a 4-step build sequence (Memory → Redis → config
    # loader → wire to gateway), so this should land HIT or PARTIAL.
    - build_sequence_planned
  miss:
    # The plan mentions a one-line validation note ("unit-test the Lua
    # script with real Redis in CI") but no concrete demo-scale plan or
    # NFR verification — should miss the high-weight build-mode signal.
    - validation_plan_concrete
  hit: []
  # Question doesn't invoke AI; relevance gate skips ai_strategy_explicit
  # even though the build-mode rubric weights it high.
  skipped:
    - ai_strategy_explicit
